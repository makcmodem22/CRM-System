name: Cancel low-attendance lessons

on:
  schedule:
    # Every 15 minutes. Replaces the Vercel cron (Hobby plan only allows daily).
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

concurrency:
  group: cancel-low-attendance
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/cancel-low-attendance
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${SITE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing SITE_URL or CRON_SECRET repo secret" >&2
            exit 1
          fi
          response=$(mktemp)
          status=$(curl -sS -o "$response" -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL%/}/api/cron/cancel-low-attendance")
          echo "HTTP ${status}"
          cat "$response"
          echo
          if [ "$status" != "200" ]; then
            exit 1
          fi
