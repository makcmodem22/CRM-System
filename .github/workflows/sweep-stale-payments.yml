name: Sweep stale LiqPay pending payments

on:
  schedule:
    # Every 5 minutes. LiqPay checkout windows are ~15-20 min, so a 5-min cadence
    # releases held slots quickly after the user abandons.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: sweep-stale-payments
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hit /api/cron/sweep-stale-payments
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          if [ -z "${SITE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing SITE_URL or CRON_SECRET repo secret" >&2
            exit 1
          fi
          response=$(mktemp)
          status=$(curl -sS -o "$response" -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL%/}/api/cron/sweep-stale-payments")
          echo "HTTP ${status}"
          cat "$response"
          echo
          if [ "$status" != "200" ]; then
            exit 1
          fi
